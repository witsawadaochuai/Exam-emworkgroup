services:
  db:
    image: postgres:16-alpine
    container_name: shift_pg
    environment:
      POSTGRES_USER: shift
      POSTGRES_PASSWORD: shift
      POSTGRES_DB: shift
    ports:
      - "5433:5432"          # PostgreSQL จริงที่ port 5433 (เลี่ยงชนกับ audit-app ที่ 5432)
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
